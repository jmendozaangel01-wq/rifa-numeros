<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifa — Elige tus números</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --dark: #0A0A0A;
      --dark-2: #111111;
      --dark-3: #1A1A1A;
      --dark-4: #222222;
      --text: #F0EDE8;
      --text-muted: #888;
      --red: #C0392B;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      width: 100%;
      background: var(--dark-2);
      border-bottom: 1px solid #222;
      padding: 28px 24px 20px;
      text-align: center;
      position: relative;
    }

    .header::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .header-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 10vw, 72px);
      letter-spacing: 3px;
      color: var(--text);
      line-height: 1;
    }

    .header-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 300;
    }

    /* Counter badge */
    .counter-wrap {
      margin: 28px auto 0;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
    }

    .counter-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .counter-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      transition: background 0.3s;
    }

    .dot.filled {
      background: var(--gold);
    }

    /* Grid */
    .grid-section {
      width: 100%;
      max-width: 420px;
      padding: 32px 20px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .num-btn {
      aspect-ratio: 1;
      border: 1.5px solid #2A2A2A;
      border-radius: 10px;
      background: var(--dark-3);
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .num-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.18s;
    }

    .num-btn:hover:not(.tomado):not(.selected)::after {
      opacity: 0.08;
    }

    .num-btn.selected {
      border-color: var(--gold);
      background: var(--dark-4);
      color: var(--gold);
      box-shadow: 0 0 16px rgba(201, 168, 76, 0.2);
      transform: scale(1.04);
    }

    .num-btn.tomado {
      border-color: #1E1E1E;
      background: #0F0F0F;
      color: #333;
      cursor: not-allowed;
      position: relative;
    }

    .num-btn.tomado::before {
      content: '✗';
      position: absolute;
      font-size: 10px;
      color: #333;
      top: 4px;
      right: 5px;
      font-family: sans-serif;
    }

    .num-btn.pop {
      animation: pop 0.25s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1.04); }
    }

    /* Form */
    .form-section {
      width: 100%;
      max-width: 420px;
      padding: 32px 20px 0;
    }

    .form-section h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .input-group {
      margin-bottom: 14px;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      background: var(--dark-3);
      border: 1.5px solid #2A2A2A;
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: var(--gold);
    }

    .input-group input::placeholder {
      color: #444;
    }

    /* Selected preview */
    .selected-preview {
      margin-top: 20px;
      background: var(--dark-3);
      border: 1px solid #2A2A2A;
      border-radius: 12px;
      padding: 16px;
      display: none;
    }

    .selected-preview.visible {
      display: block;
    }

    .preview-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .preview-nums {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .preview-num {
      background: var(--dark-4);
      border: 1px solid var(--gold);
      border-radius: 6px;
      padding: 4px 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--gold);
    }

    /* Submit */
    .submit-btn {
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      background: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* States */
    .msg {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .msg.error {
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid rgba(192, 57, 43, 0.4);
      color: #e74c3c;
      display: block;
    }

    .msg.success {
      background: rgba(201, 168, 76, 0.1);
      border: 1px solid rgba(201, 168, 76, 0.3);
      color: var(--gold-light);
      display: block;
    }

    /* Loading */
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--dark);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success screen */
    .success-screen {
      display: none;
      text-align: center;
      padding: 60px 24px;
      max-width: 420px;
      width: 100%;
    }

    .success-screen.visible {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .success-screen h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .success-screen p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .success-nums {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .success-num {
      background: var(--dark-3);
      border: 2px solid var(--gold);
      border-radius: 10px;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--gold);
    }

    .main-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, #1A1A1A 25%, #222 50%, #1A1A1A 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 10px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Gran Rifa</div>
  <h1>Elige tus números</h1>
  <p class="header-sub">Selecciona exactamente 4 números de la suerte</p>
  <div class="counter-wrap">
    <span class="counter-label">Seleccionados</span>
    <div class="counter-dots">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
    </div>
  </div>
</div>

<div class="main-content" id="mainContent">

  <div class="grid-section">
    <div class="grid" id="grid">
      <!-- Numbers injected by JS -->
    </div>
  </div>

  <div class="form-section">
    <h2>Tus datos</h2>

    <div class="input-group">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ej: María González">
    </div>

    <div class="input-group">
      <label>WhatsApp</label>
      <input type="tel" id="telefono" placeholder="Ej: 3001234567">
    </div>

    <div class="selected-preview" id="preview">
      <div class="preview-label">Tus números elegidos</div>
      <div class="preview-nums" id="previewNums"></div>
    </div>

    <div class="msg" id="msg"></div>

    <button class="submit-btn" id="submitBtn" disabled onclick="confirmar()">
      CONFIRMAR MIS NÚMEROS
    </button>
  </div>

</div>

<div class="success-screen" id="successScreen">
  <div class="success-icon">🎉</div>
  <h2>¡Participas!</h2>
  <p>Tus números han sido registrados. Te enviamos la confirmación a tu WhatsApp.</p>
  <div class="success-nums" id="successNums"></div>
  <p style="font-size:12px; color: #555; margin-top: 8px;">¡Mucha suerte!</p>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const N8N_GET    = 'https://n8n.srv1587395.hstgr.cloud/webhook/numeros-disponibles';
  const N8N_POST   = 'https://n8n.srv1587395.hstgr.cloud/webhook/reservar-numeros';
  const MAX_SELECT = 4;
  // ────────────────────────────────────────────────────────

  let selected = [];
  let tomados  = [];

  // Load numbers on start
  async function cargarNumeros() {
    const grid = document.getElementById('grid');

    // Skeleton while loading
    grid.innerHTML = Array(30).fill(0).map(() =>
      `<div class="num-btn skeleton" style="opacity:0.4"></div>`
    ).join('');

    try {
      const res  = await fetch(N8N_GET, { method: 'GET' });
      const raw  = await res.text();

      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        // n8n sometimes wraps in extra array
        data = [];
      }

      // Handle both array and object responses
      if (!Array.isArray(data)) data = [data];

      // Mark tomados
      tomados = data
        .filter(r => r && r.estado === 'tomado')
        .map(r => Number(r.numero));

      renderGrid();
    } catch (e) {
      // CORS or network error — render all as available
      console.warn('No se pudo cargar estado, mostrando todos disponibles', e);
      tomados = [];
      renderGrid();
    }
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (let n = 1; n <= 30; n++) {
      const btn = document.createElement('button');
      btn.className = 'num-btn' + (tomados.includes(n) ? ' tomado' : '');
      btn.textContent = n;
      btn.dataset.num = n;
      if (!tomados.includes(n)) {
        btn.onclick = () => toggleNum(n, btn);
      }
      grid.appendChild(btn);
    }
  }

  function toggleNum(n, btn) {
    if (tomados.includes(n)) return;

    if (selected.includes(n)) {
      selected = selected.filter(x => x !== n);
      btn.classList.remove('selected');
    } else {
      if (selected.length >= MAX_SELECT) {
        showMsg('Solo puedes elegir 4 números', 'error');
        return;
      }
      selected.push(n);
      btn.classList.add('selected', 'pop');
      btn.addEventListener('animationend', () => btn.classList.remove('pop'), { once: true });
    }

    clearMsg();
    updateDots();
    updatePreview();
    updateSubmit();
  }

  function updateDots() {
    for (let i = 1; i <= 4; i++) {
      document.getElementById('d' + i).classList.toggle('filled', i <= selected.length);
    }
  }

  function updatePreview() {
    const preview = document.getElementById('preview');
    const nums    = document.getElementById('previewNums');

    if (selected.length > 0) {
      preview.classList.add('visible');
      nums.innerHTML = [...selected].sort((a,b) => a-b)
        .map(n => `<div class="preview-num">${n}</div>`).join('');
    } else {
      preview.classList.remove('visible');
    }
  }

  function updateSubmit() {
    const btn    = document.getElementById('submitBtn');
    const nombre = document.getElementById('nombre').value.trim();
    const tel    = document.getElementById('telefono').value.trim();
    btn.disabled = selected.length < MAX_SELECT || !nombre || !tel;
  }

  document.getElementById('nombre').addEventListener('input', updateSubmit);
  document.getElementById('telefono').addEventListener('input', updateSubmit);

  async function confirmar() {
    const nombre   = document.getElementById('nombre').value.trim();
    const telefono = document.getElementById('telefono').value.trim();

    if (selected.length < MAX_SELECT) return showMsg('Debes elegir 4 números', 'error');
    if (!nombre) return showMsg('Ingresa tu nombre', 'error');
    if (!telefono) return showMsg('Ingresa tu WhatsApp', 'error');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>ENVIANDO...';

    try {
      const res = await fetch(N8N_POST, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre,
          telefono: '57' + telefono.replace(/\D/g, ''),
          numeros: selected
        })
      });

      if (!res.ok) throw new Error('Error del servidor');

      // Show success
      document.getElementById('mainContent').style.display = 'none';
      const ss = document.getElementById('successScreen');
      ss.classList.add('visible');
      document.getElementById('successNums').innerHTML = [...selected].sort((a,b)=>a-b)
        .map(n => `<div class="success-num">${n}</div>`).join('');

    } catch (e) {
      showMsg('Ocurrió un error. Intenta de nuevo.', 'error');
      btn.disabled = false;
      btn.innerHTML = 'CONFIRMAR MIS NÚMEROS';
    }
  }

  function showMsg(text, type) {
    const m = document.getElementById('msg');
    m.textContent = text;
    m.className = 'msg ' + type;
  }

  function clearMsg() {
    const m = document.getElementById('msg');
    m.className = 'msg';
  }

  cargarNumeros();
</script>
</body>
</html>
